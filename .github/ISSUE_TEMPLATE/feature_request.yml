name: Feature Request
description: Suggest a feature for tauri-plugin-background-service
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve? What are you trying to do that is not currently possible?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions or workarounds have you considered?
    validations:
      required: false

  - type: checkboxes
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) would benefit from this feature?
      options:
        - label: Android
        - label: iOS
        - label: Windows
        - label: macOS
        - label: Linux
