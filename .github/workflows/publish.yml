name: Publish Plugin

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        working-directory: tauri-plugin-background-service
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: tauri-plugin-background-service/guest-js
        run: npm ci

      - name: Build
        working-directory: tauri-plugin-background-service/guest-js
        run: npm run build

      - name: Publish
        working-directory: tauri-plugin-background-service/guest-js
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
